<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shapefile Toolkit</title>
<link rel="stylesheet" href="styles/app.css">
</head>
<body>

<div id="titlebar">
  <div id="titlebar-drag">
    <svg class="app-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="#f6c453" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
    <span class="app-title">Shapefile Toolkit</span>
  </div>
  <div id="window-controls">
    <button class="win-btn" id="btn-minimize"><svg viewBox="0 0 12 12" width="12" height="12"><rect x="1" y="5.5" width="10" height="1" fill="currentColor"/></svg></button>
    <button class="win-btn" id="btn-maximize"><svg viewBox="0 0 12 12" width="12" height="12"><rect x="1.5" y="1.5" width="9" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1"/></svg></button>
    <button class="win-btn win-btn-close" id="btn-close"><svg viewBox="0 0 12 12" width="12" height="12"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.2"/></svg></button>
  </div>
</div>

<div id="app-layout">
  <aside id="sidebar">
    <div class="sidebar-header">
      <h2>图层管理</h2>
      <div class="sidebar-actions">
        <button class="tool-btn" id="btn-add-files" title="添加文件"><svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></button>
        <button class="tool-btn" id="btn-add-folder" title="添加文件夹"><svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg></button>
        <button class="tool-btn" id="btn-clear-all" title="清空所有"><svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
      </div>
    </div>
    <div id="drop-zone">
      <div class="drop-content">
        <svg viewBox="0 0 48 48" width="40" height="40"><path fill="#6b7280" d="M24 4C12.95 4 4 12.95 4 24s8.95 20 20 20 20-8.95 20-20S35.05 4 24 4zm10 22h-8v8h-4v-8h-8v-4h8v-8h4v8h8v4z"/></svg>
        <p>拖拽 .shp 文件到此处</p>
        <span class="drop-hint">或点击上方按钮添加</span>
      </div>
    </div>
    <div id="layer-list"></div>
  </aside>

  <main id="content">
    <div id="empty-state">
      <svg viewBox="0 0 80 80" width="80" height="80"><path fill="#2a2a3e" d="M40 8C22.33 8 8 22.33 8 40s14.33 32 32 32 32-14.33 32-32S57.67 8 40 8zm-4 48h-8V32h-4v-4h12v28zm20 0h-8V32h-4v-4h12v28z"/></svg>
      <h2>欢迎使用 Shapefile Toolkit</h2>
      <p>拖拽 Shapefile 文件到左侧区域开始使用</p>
      <div class="features-row">
        <div class="feature-item"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="#f6c453" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg><span>批量导入 SHP</span></div>
        <div class="feature-item"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="#f6c453" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg><span>属性表查看</span></div>
        <div class="feature-item"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="#f6c453" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg><span>格式转换</span></div>
        <div class="feature-item"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="#f6c453" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg><span>空间操作</span></div>
      </div>
    </div>

    <div id="layer-detail" class="hidden">
      <div id="layer-tabs">
        <button class="tab-btn active" data-tab="info">信息</button>
        <button class="tab-btn" data-tab="preview">预览</button>
        <button class="tab-btn" data-tab="attributes">属性表</button>
        <button class="tab-btn" data-tab="operations">操作</button>
      </div>

      <div class="tab-content active" id="tab-info">
        <div id="layer-info"></div>
      </div>

      <div class="tab-content" id="tab-preview">
        <div id="preview-container">
          <canvas id="preview-canvas"></canvas>
          <div class="preview-toolbar">
            <button class="tool-btn" id="btn-zoom-in" title="放大"><svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14zM12 10h-5V5h2v3h3v2z"/></svg></button>
            <button class="tool-btn" id="btn-zoom-out" title="缩小"><svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14zM7 9v2h5V9H7z"/></svg></button>
            <button class="tool-btn" id="btn-reset-view" title="重置视图"><svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12 5c-3.87 0-7 3.13-7 7h2c0-2.76 2.24-5 5-5s5 2.24 5 5h2c0-3.87-3.13-7-7-7zm1 9.29c.88-.39 1.5-1.26 1.5-2.29A2.5 2.5 0 0 0 12 9.5 2.5 2.5 0 0 0 9.5 12c0 1.02.62 1.9 1.5 2.29v3.3L7.59 16l-1.42 1.41L12 22l5.83-4.59-1.42-1.41L13 17.59v-3.3z"/></svg></button>
          </div>
        </div>
      </div>

      <div class="tab-content" id="tab-attributes">
        <div id="attr-toolbar">
          <span id="attr-count">0 条记录</span>
          <div class="attr-search">
            <input type="text" id="attr-search-input" placeholder="搜索属性..." />
          </div>
        </div>
        <div id="attr-table-wrapper">
          <table id="attr-table">
            <thead><tr id="attr-header"></tr></thead>
            <tbody id="attr-body"></tbody>
          </table>
        </div>
      </div>

      <div class="tab-content" id="tab-operations">
        <div class="ops-grid">
          <div class="op-card">
            <div class="op-card-header"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="#f6c453" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg><h3>导出</h3></div>
            <div class="op-card-body">
              <select id="export-format" class="op-select"><option value="geojson">GeoJSON</option><option value="csv">CSV</option><option value="zip">Zip 打包</option></select>
              <button class="op-btn" id="btn-export">导出当前图层</button>
            </div>
          </div>
          <div class="op-card">
            <div class="op-card-header"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4ECDC4" d="M16.01 11H4v2h12.01v3L20 12l-3.99-4v3z"/></svg><h3>格式转换</h3></div>
            <div class="op-card-body">
              <select id="convert-format" class="op-select"><option value="geojson">转 GeoJSON</option><option value="csv">转 CSV</option><option value="json">转 JSON</option></select>
              <button class="op-btn" id="btn-convert">转换</button>
            </div>
          </div>
          <div class="op-card">
            <div class="op-card-header"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="#FF6B6B" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg><h3>空间操作</h3></div>
            <div class="op-card-body">
              <select id="spatial-op" class="op-select">
                <option value="buffer">缓冲区</option>
                <option value="simplify">简化</option>
                <option value="centroid">质心</option>
                <option value="dissolve">融合</option>
              </select>
              <div id="spatial-params" class="op-params">
                <input type="number" id="spatial-radius" value="100" placeholder="半径" class="op-input" />
                <select id="spatial-units" class="op-select small"><option value="meters">米</option><option value="kilometers">千米</option><option value="degrees">度</option></select>
              </div>
              <button class="op-btn" id="btn-spatial">执行</button>
            </div>
          </div>
          <div class="op-card">
            <div class="op-card-header"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="#A29BFE" d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg><h3>批量操作</h3></div>
            <div class="op-card-body">
              <select id="batch-op" class="op-select">
                <option value="export-geojson">批量导出 GeoJSON</option>
                <option value="export-csv">批量导出 CSV</option>
                <option value="export-zip">批量打包 Zip</option>
              </select>
              <button class="op-btn" id="btn-batch">批量执行</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="progress-bar" class="hidden">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <span id="progress-text">处理中...</span>
    </div>
  </main>
</div>

<div id="toast-container"></div>

<div id="context-menu" class="hidden">
  <ul>
    <li data-action="remove">移除图层</li>
    <li data-action="export">导出</li>
    <li data-action="show-in-explorer">在文件夹中显示</li>
  </ul>
</div>

<script src="js/drag-drop.js"></script>
<script src="js/layer-list.js"></script>
<script src="js/attribute-table.js"></script>
<script src="js/map-preview.js"></script>
<script src="js/batch-tasks.js"></script>
<script src="js/export-dialog.js"></script>
<script src="js/app.js"></script>
</body>
</html>
